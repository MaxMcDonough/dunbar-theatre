<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Film reel — decorative element -->
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#C22B2B" stroke-width="2.5" opacity="0.6"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
  <!-- Inner hub -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="#C22B2B" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="8" fill="#C22B2B" opacity="0.3"/>
  <!-- Spokes -->
  <g stroke="#C22B2B" stroke-width="1.5" opacity="0.35">
    <line x1="100" y1="25" x2="100" y2="75"/>
    <line x1="100" y1="125" x2="100" y2="175"/>
    <line x1="25" y1="100" x2="75" y2="100"/>
    <line x1="125" y1="100" x2="175" y2="100"/>
    <line x1="47" y1="47" x2="82" y2="82"/>
    <line x1="118" y1="118" x2="153" y2="153"/>
    <line x1="153" y1="47" x2="118" y2="82"/>
    <line x1="82" y1="118" x2="47" y2="153"/>
  </g>
  <!-- Film wound on reel (concentric arcs) -->
  <g fill="none" stroke="#C22B2B" stroke-width="0.8" opacity="0.15">
    <circle cx="100" cy="100" r="35"/>
    <circle cx="100" cy="100" r="42"/>
    <circle cx="100" cy="100" r="49"/>
    <circle cx="100" cy="100" r="56"/>
    <circle cx="100" cy="100" r="63"/>
    <circle cx="100" cy="100" r="70"/>
  </g>
  <!-- Sprocket notches around outer edge -->
  <g fill="#C22B2B" opacity="0.2">
    <rect x="96" y="6" width="8" height="6" rx="1"/>
    <rect x="96" y="188" width="8" height="6" rx="1"/>
    <rect x="6" y="96" width="6" height="8" rx="1"/>
    <rect x="188" y="96" width="6" height="8" rx="1"/>
    <rect x="32" y="32" width="7" height="7" rx="1" transform="rotate(45,35.5,35.5)"/>
    <rect x="161" y="32" width="7" height="7" rx="1" transform="rotate(45,164.5,35.5)"/>
    <rect x="32" y="161" width="7" height="7" rx="1" transform="rotate(45,35.5,164.5)"/>
    <rect x="161" y="161" width="7" height="7" rx="1" transform="rotate(45,164.5,164.5)"/>
  </g>
</svg>