<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Location / Visit — map pin with theatre silhouette -->
  <!-- Compass rose background -->
  <g stroke="#C22B2B" stroke-width="0.5" opacity="0.1" transform="translate(150,150)">
    <circle r="120" fill="none"/>
    <circle r="90" fill="none"/>
    <circle r="60" fill="none"/>
    <line x1="0" y1="-130" x2="0" y2="130"/>
    <line x1="-130" y1="0" x2="130" y2="0"/>
    <line x1="-92" y1="-92" x2="92" y2="92"/>
    <line x1="92" y1="-92" x2="-92" y2="92"/>
  </g>
  <!-- Map pin shape -->
  <path d="M150,260 Q150,260 100,170 Q70,120 70,90 Q70,45 110,25 Q130,15 150,15 Q170,15 190,25 Q230,45 230,90 Q230,120 200,170 Q150,260 150,260 Z" fill="none" stroke="#C22B2B" stroke-width="2.5"/>
  <!-- Inner circle of pin -->
  <circle cx="150" cy="90" r="50" fill="none" stroke="#C22B2B" stroke-width="1.5" opacity="0.5"/>
  <!-- Theatre silhouette inside the pin -->
  <g transform="translate(150,90)">
    <!-- Mini building -->
    <rect x="-28" y="-15" width="56" height="35" fill="none" stroke="#1C1917" stroke-width="1.5"/>
    <!-- Mini blade sign -->
    <rect x="-6" y="-35" width="12" height="22" fill="none" stroke="#C22B2B" stroke-width="1.5"/>
    <!-- Mini crown -->
    <rect x="-8" y="-38" width="16" height="4" fill="none" stroke="#C22B2B" stroke-width="1" rx="2"/>
    <!-- Mini marquee -->
    <line x1="-25" y1="10" x2="25" y2="10" stroke="#1C1917" stroke-width="1.5"/>
    <!-- Mini door -->
    <rect x="-6" y="12" width="12" height="8" fill="none" stroke="#1C1917" stroke-width="1"/>
    <!-- Mini speed lines -->
    <line x1="-18" y1="-30" x2="-8" y2="-30" stroke="#C22B2B" stroke-width="0.8" opacity="0.5"/>
    <line x1="8" y1="-30" x2="18" y2="-30" stroke="#C22B2B" stroke-width="0.8" opacity="0.5"/>
  </g>
  <!-- "N" compass indicator -->
  <text x="150" y="290" font-family="Georgia, serif" font-size="11" fill="#C22B2B" text-anchor="middle" opacity="0.4" letter-spacing="1">4555 DUNBAR ST</text>
  <!-- Small directional arrow -->
  <path d="M148,265 L150,258 L152,265" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.4"/>
</svg>