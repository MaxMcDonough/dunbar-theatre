<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Theatre curtains — for Events section -->
  <!-- Stage/proscenium arch -->
  <path d="M30,40 L30,280 L270,280 L270,40" fill="none" stroke="#1C1917" stroke-width="3"/>
  <path d="M25,40 Q150,15 275,40" fill="none" stroke="#1C1917" stroke-width="3"/>
  <!-- Art Deco arch detail -->
  <path d="M35,45 Q150,22 265,45" fill="none" stroke="#C22B2B" stroke-width="1.5" opacity="0.5"/>
  <!-- Left curtain -->
  <path d="M35,45 Q50,50 55,280 L35,280 Z" fill="#C22B2B" opacity="0.6"/>
  <path d="M35,45 Q65,55 75,280 L55,280 Q50,50 35,45" fill="#C22B2B" opacity="0.5"/>
  <path d="M35,45 Q85,65 95,280 L75,280 Q65,55 35,45" fill="#C22B2B" opacity="0.4"/>
  <path d="M35,45 Q100,80 110,280 L95,280 Q85,65 35,45" fill="#C22B2B" opacity="0.3"/>
  <!-- Right curtain -->
  <path d="M265,45 Q250,50 245,280 L265,280 Z" fill="#C22B2B" opacity="0.6"/>
  <path d="M265,45 Q235,55 225,280 L245,280 Q250,50 265,45" fill="#C22B2B" opacity="0.5"/>
  <path d="M265,45 Q215,65 205,280 L225,280 Q235,55 265,45" fill="#C22B2B" opacity="0.4"/>
  <path d="M265,45 Q200,80 190,280 L205,280 Q215,65 265,45" fill="#C22B2B" opacity="0.3"/>
  <!-- Screen (white rectangle in the middle) -->
  <rect x="120" y="90" width="60" height="40" fill="none" stroke="#1C1917" stroke-width="1.5" rx="2" opacity="0.3"/>
  <!-- Film projector beam -->
  <g opacity="0.15">
    <polygon points="150,250 120,90 180,90" fill="#ffeebb"/>
  </g>
  <!-- Seats row at bottom -->
  <g fill="none" stroke="#1C1917" stroke-width="1.5" opacity="0.3">
    <rect x="70" y="260" width="16" height="12" rx="3"/>
    <rect x="92" y="260" width="16" height="12" rx="3"/>
    <rect x="114" y="260" width="16" height="12" rx="3"/>
    <rect x="136" y="260" width="16" height="12" rx="3"/>
    <rect x="158" y="260" width="16" height="12" rx="3"/>
    <rect x="180" y="260" width="16" height="12" rx="3"/>
    <rect x="202" y="260" width="16" height="12" rx="3"/>
  </g>
  <!-- Spotlight circles -->
  <circle cx="150" cy="110" r="25" fill="none" stroke="#C22B2B" stroke-width="0.5" opacity="0.2"/>
  <circle cx="150" cy="110" r="35" fill="none" stroke="#C22B2B" stroke-width="0.5" opacity="0.15"/>
  <!-- Art Deco keystone at top of arch -->
  <path d="M142,25 L150,18 L158,25 Z" fill="#C22B2B" opacity="0.5"/>
</svg>