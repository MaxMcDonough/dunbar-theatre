<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Popcorn bucket -->
  <path d="M90,280 L75,140 L225,140 L210,280 Z" fill="#C22B2B" stroke="#9B1F1F" stroke-width="2"/>
  <!-- Bucket stripes -->
  <path d="M84,170 L216,170" stroke="#FAF8F5" stroke-width="3" opacity="0.4"/>
  <path d="M80,200 L220,200" stroke="#FAF8F5" stroke-width="3" opacity="0.4"/>
  <path d="M78,230 L222,230" stroke="#FAF8F5" stroke-width="3" opacity="0.4"/>
  <path d="M76,260 L224,260" stroke="#FAF8F5" stroke-width="3" opacity="0.4"/>
  <!-- Bucket rim -->
  <ellipse cx="150" cy="140" rx="76" ry="12" fill="#9B1F1F"/>
  <ellipse cx="150" cy="138" rx="72" ry="10" fill="#D44040"/>
  <!-- Popcorn kernels (fluffy organic shapes) -->
  <g fill="#F2EDE4" stroke="#D6D3D1" stroke-width="0.5">
    <circle cx="120" cy="125" r="16"/>
    <circle cx="150" cy="118" r="18"/>
    <circle cx="180" cy="122" r="16"/>
    <circle cx="135" cy="105" r="15"/>
    <circle cx="165" cy="100" r="17"/>
    <circle cx="195" cy="112" r="13"/>
    <circle cx="105" cy="115" r="12"/>
    <circle cx="145" cy="88" r="14"/>
    <circle cx="170" cy="82" r="13"/>
    <circle cx="125" cy="90" r="12"/>
    <circle cx="155" cy="72" r="11"/>
    <circle cx="185" cy="92" r="12"/>
    <circle cx="140" cy="75" r="10"/>
    <circle cx="110" cy="100" r="11"/>
    <circle cx="190" cy="104" r="10"/>
  </g>
  <!-- Butter highlights -->
  <g fill="#ffd080" opacity="0.3">
    <circle cx="130" cy="108" r="4"/>
    <circle cx="160" cy="95" r="5"/>
    <circle cx="145" cy="120" r="3"/>
    <circle cx="175" cy="110" r="4"/>
  </g>
  <!-- "DUNBAR" text on bucket -->
  <text x="150" y="218" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#FAF8F5" text-anchor="middle" letter-spacing="5" opacity="0.8">DUNBAR</text>
  <!-- Art Deco accent lines at bottom -->
  <line x1="100" y1="290" x2="200" y2="290" stroke="#C22B2B" stroke-width="2" opacity="0.4"/>
  <line x1="115" y1="295" x2="185" y2="295" stroke="#C22B2B" stroke-width="1.5" opacity="0.3"/>
</svg>