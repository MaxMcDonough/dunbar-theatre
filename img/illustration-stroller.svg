<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Movies for Mommies — stroller + film -->
  <!-- Film strip wrapping around -->
  <g fill="none" stroke="#C22B2B" stroke-width="1.5" opacity="0.3">
    <path d="M20,50 Q80,30 140,60 Q200,90 260,60"/>
    <path d="M40,250 Q100,270 170,240 Q230,210 280,240"/>
  </g>
  <!-- Stroller body -->
  <path d="M100,160 L100,130 Q100,110 120,110 L200,110 Q210,110 210,120 L210,180 Q210,195 195,195 L115,195 Q100,195 100,180 Z" fill="none" stroke="#1C1917" stroke-width="2.5"/>
  <!-- Stroller hood/canopy -->
  <path d="M100,130 Q100,80 150,80 Q190,80 200,110" fill="none" stroke="#C22B2B" stroke-width="2.5"/>
  <path d="M105,125 Q110,90 150,88 Q185,88 195,112" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.4"/>
  <!-- Handle -->
  <path d="M90,160 L80,120 Q78,105 85,100" fill="none" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="120" cy="210" r="16" fill="none" stroke="#1C1917" stroke-width="2.5"/>
  <circle cx="120" cy="210" r="3" fill="#C22B2B"/>
  <circle cx="195" cy="210" r="16" fill="none" stroke="#1C1917" stroke-width="2.5"/>
  <circle cx="195" cy="210" r="3" fill="#C22B2B"/>
  <!-- Wheel spokes -->
  <line x1="120" y1="196" x2="120" y2="224" stroke="#1C1917" stroke-width="1" opacity="0.3"/>
  <line x1="106" y1="210" x2="134" y2="210" stroke="#1C1917" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="196" x2="195" y2="224" stroke="#1C1917" stroke-width="1" opacity="0.3"/>
  <line x1="181" y1="210" x2="209" y2="210" stroke="#1C1917" stroke-width="1" opacity="0.3"/>
  <!-- Small star/heart detail -->
  <g fill="#C22B2B" opacity="0.5">
    <circle cx="155" cy="150" r="3"/>
    <circle cx="165" cy="145" r="2"/>
    <circle cx="145" cy="148" r="2"/>
  </g>
  <!-- Film reel tiny -->
  <circle cx="240" cy="80" r="22" fill="none" stroke="#C22B2B" stroke-width="1.5" opacity="0.5"/>
  <circle cx="240" cy="80" r="12" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
  <circle cx="240" cy="80" r="3" fill="#C22B2B" opacity="0.4"/>
  <!-- Small film frames -->
  <rect x="60" y="250" width="12" height="9" rx="1" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
  <rect x="78" y="250" width="12" height="9" rx="1" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
  <rect x="96" y="250" width="12" height="9" rx="1" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.3"/>
</svg>