<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient - warm evening tones -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="25%" stop-color="#2d1f3d"/>
      <stop offset="50%" stop-color="#4a2842"/>
      <stop offset="70%" stop-color="#8b4a52"/>
      <stop offset="85%" stop-color="#c97856"/>
      <stop offset="100%" stop-color="#e8a96a"/>
    </linearGradient>
    <!-- Neon glow for sign -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Light beam from entrance -->
    <linearGradient id="lightBeam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffeebb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffeebb" stop-opacity="0"/>
    </linearGradient>
    <!-- Marquee warm glow -->
    <radialGradient id="marqueeGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#ffd080" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd080" stop-opacity="0"/>
    </radialGradient>
    <!-- Street gradient -->
    <linearGradient id="street" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3430"/>
      <stop offset="100%" stop-color="#2a2420"/>
    </linearGradient>
    <!-- Sidewalk -->
    <linearGradient id="sidewalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6055"/>
      <stop offset="100%" stop-color="#4a4035"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- STARS -->
  <circle cx="120" cy="80" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="350" cy="45" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="510" cy="120" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="680" cy="30" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="900" cy="75" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="1100" cy="50" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1250" cy="100" r="1.3" fill="#fff" opacity="0.4"/>
  <circle cx="1400" cy="60" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="160" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="1350" cy="130" r="0.8" fill="#fff" opacity="0.3"/>

  <!-- DISTANT BUILDINGS / NEIGHBOURHOOD SILHOUETTE -->
  <path d="M0,620 L0,560 L80,560 L80,540 L160,540 L160,555 L200,555 L200,530 L240,530 L240,555 L320,555 L320,520 L360,520 L360,545 L440,545 L440,565 L520,565 L520,540 L560,540 L560,560 L600,560 L600,530 L640,530 L640,560" fill="#1c1917" opacity="0.3"/>
  <path d="M1000,620 L1000,555 L1040,555 L1040,540 L1080,540 L1080,560 L1120,560 L1120,520 L1160,520 L1160,545 L1200,545 L1200,530 L1240,530 L1240,555 L1300,555 L1300,540 L1340,540 L1340,560 L1400,560 L1400,535 L1440,535 L1440,555 L1500,555 L1500,540 L1540,540 L1540,560 L1600,560 L1600,620" fill="#1c1917" opacity="0.3"/>

  <!-- NEIGHBOURING BUILDING LEFT -->
  <rect x="200" y="480" width="300" height="220" fill="#2a2520" stroke="#3a3530" stroke-width="1"/>
  <rect x="220" y="510" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="270" y="510" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="320" y="510" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="370" y="510" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="420" y="510" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="220" y="570" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="270" y="570" width="30" height="40" fill="#332820" rx="2"/>
  <rect x="320" y="570" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="370" y="570" width="30" height="40" fill="#1a1515" rx="2"/>
  <rect x="420" y="570" width="30" height="40" fill="#332820" rx="2"/>
  <rect x="220" y="630" width="30" height="45" fill="#332820" rx="2"/>
  <rect x="270" y="630" width="30" height="45" fill="#1a1515" rx="2"/>
  <rect x="320" y="625" width="60" height="75" fill="#332820" rx="2"/>
  <!-- Awning on left building -->
  <path d="M200,480 L260,472 L260,480" fill="#3a3030"/>

  <!-- NEIGHBOURING BUILDING RIGHT -->
  <rect x="1100" y="510" width="300" height="190" fill="#2a2520" stroke="#3a3530" stroke-width="1"/>
  <rect x="1120" y="535" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1165" y="535" width="28" height="35" fill="#332820" rx="2"/>
  <rect x="1210" y="535" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1255" y="535" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1300" y="535" width="28" height="35" fill="#332820" rx="2"/>
  <rect x="1350" y="535" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1120" y="590" width="28" height="35" fill="#332820" rx="2"/>
  <rect x="1165" y="590" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1210" y="590" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1255" y="590" width="28" height="35" fill="#332820" rx="2"/>
  <rect x="1300" y="590" width="28" height="35" fill="#1a1515" rx="2"/>
  <rect x="1350" y="590" width="28" height="35" fill="#1a1515" rx="2"/>

  <!-- ============================================= -->
  <!-- THE DUNBAR THEATRE — MAIN BUILDING -->
  <!-- ============================================= -->

  <!-- Main building body -->
  <rect x="500" y="380" width="600" height="320" fill="#d4cbbf"/>
  <!-- Building face shadow detail -->
  <rect x="500" y="380" width="600" height="320" fill="#c8bfb0" opacity="0.5"/>
  <!-- Subtle facade texture lines -->
  <line x1="500" y1="395" x2="1100" y2="395" stroke="#bdb4a5" stroke-width="0.5" opacity="0.4"/>
  <line x1="500" y1="410" x2="1100" y2="410" stroke="#bdb4a5" stroke-width="0.5" opacity="0.3"/>

  <!-- Upper wall panel (stepped parapet) -->
  <rect x="530" y="370" width="540" height="25" fill="#d8d0c4"/>
  <rect x="540" y="360" width="520" height="15" fill="#ddd5c9"/>

  <!-- Right side Art Deco wing detail -->
  <rect x="1020" y="340" width="80" height="60" fill="#d8d0c4"/>
  <rect x="1030" y="330" width="60" height="15" fill="#ddd5c9"/>
  <!-- Stepped detail on right -->
  <rect x="1040" y="345" width="8" height="50" fill="#c8bfb0"/>
  <rect x="1058" y="345" width="8" height="50" fill="#c8bfb0"/>
  <rect x="1076" y="345" width="8" height="50" fill="#c8bfb0"/>

  <!-- ============================================= -->
  <!-- THE BLADE SIGN — The iconic vertical "DUNBAR" -->
  <!-- ============================================= -->

  <!-- Sign tower / pylon -->
  <rect x="710" y="130" width="80" height="280" fill="#d8d0c4" rx="3"/>
  <!-- Sign tower sides (3D depth) -->
  <rect x="705" y="130" width="5" height="280" fill="#c0b5a5"/>
  <rect x="790" y="130" width="5" height="280" fill="#c0b5a5"/>

  <!-- Top crown — Streamline Moderne fins -->
  <rect x="700" y="115" width="100" height="20" fill="#d8d0c4" rx="10"/>
  <rect x="710" y="100" width="80" height="20" fill="#ddd5c9" rx="8"/>
  <rect x="720" y="88" width="60" height="16" fill="#e2dbd0" rx="6"/>

  <!-- NEON SIGN LETTERS — "DUNBAR" vertical -->
  <g filter="url(#neonGlow)">
    <text x="750" y="190" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">D</text>
    <text x="750" y="225" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">U</text>
    <text x="750" y="260" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">N</text>
    <text x="750" y="295" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">B</text>
    <text x="750" y="330" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">A</text>
    <text x="750" y="365" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#C22B2B" text-anchor="middle" letter-spacing="3">R</text>
  </g>

  <!-- Neon glow halo around blade sign -->
  <rect x="700" y="130" width="100" height="280" fill="none" stroke="#C22B2B" stroke-width="1" opacity="0.15" rx="3"/>
  <rect x="695" y="125" width="110" height="290" fill="none" stroke="#C22B2B" stroke-width="0.5" opacity="0.08" rx="5"/>

  <!-- Horizontal speed-line fins on sign (Streamline Moderne detail) -->
  <!-- Left fins -->
  <rect x="660" y="155" width="45" height="5" fill="#d0c7ba" rx="2"/>
  <rect x="670" y="165" width="35" height="5" fill="#d0c7ba" rx="2"/>
  <rect x="680" y="175" width="25" height="5" fill="#d0c7ba" rx="2"/>
  <!-- Right fins -->
  <rect x="795" y="155" width="45" height="5" fill="#d0c7ba" rx="2"/>
  <rect x="795" y="165" width="35" height="5" fill="#d0c7ba" rx="2"/>
  <rect x="795" y="175" width="25" height="5" fill="#d0c7ba" rx="2"/>

  <!-- Bottom speed-line fins -->
  <rect x="660" y="390" width="45" height="4" fill="#c0b5a5" rx="2"/>
  <rect x="670" y="398" width="35" height="4" fill="#c0b5a5" rx="2"/>
  <rect x="795" y="390" width="45" height="4" fill="#c0b5a5" rx="2"/>
  <rect x="795" y="398" width="35" height="4" fill="#c0b5a5" rx="2"/>

  <!-- ============================================= -->
  <!-- MARQUEE / CANOPY -->
  <!-- ============================================= -->

  <!-- Marquee canopy - wedge shape -->
  <path d="M540,580 L1060,580 L1080,595 L520,595 Z" fill="#ccc3b5"/>
  <path d="M520,595 L1080,595 L1080,605 L520,605 Z" fill="#b8afa0"/>

  <!-- Marquee warm glow underneath -->
  <rect x="540" y="605" width="520" height="30" fill="url(#marqueeGlow)" opacity="0.6"/>

  <!-- Marquee lights (small dots along the edge) -->
  <g fill="#ffeebb" filter="url(#softGlow)" opacity="0.8">
    <circle cx="555" cy="598" r="2.5"/>
    <circle cx="580" cy="598" r="2.5"/>
    <circle cx="605" cy="598" r="2.5"/>
    <circle cx="630" cy="598" r="2.5"/>
    <circle cx="655" cy="598" r="2.5"/>
    <circle cx="680" cy="598" r="2.5"/>
    <circle cx="705" cy="598" r="2.5"/>
    <circle cx="730" cy="598" r="2.5"/>
    <circle cx="755" cy="598" r="2.5"/>
    <circle cx="780" cy="598" r="2.5"/>
    <circle cx="805" cy="598" r="2.5"/>
    <circle cx="830" cy="598" r="2.5"/>
    <circle cx="855" cy="598" r="2.5"/>
    <circle cx="880" cy="598" r="2.5"/>
    <circle cx="905" cy="598" r="2.5"/>
    <circle cx="930" cy="598" r="2.5"/>
    <circle cx="955" cy="598" r="2.5"/>
    <circle cx="980" cy="598" r="2.5"/>
    <circle cx="1005" cy="598" r="2.5"/>
    <circle cx="1030" cy="598" r="2.5"/>
    <circle cx="1055" cy="598" r="2.5"/>
  </g>

  <!-- "DUNBAR" horizontal text on facade above marquee -->
  <g opacity="0.7">
    <text x="800" y="560" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#8a7e72" text-anchor="middle" letter-spacing="18">DUNBAR</text>
  </g>

  <!-- Pilasters (vertical decorative columns on facade) -->
  <rect x="545" y="410" width="12" height="165" fill="#c0b5a5" rx="2"/>
  <rect x="1043" y="410" width="12" height="165" fill="#c0b5a5" rx="2"/>
  <!-- Mid pilasters -->
  <rect x="680" y="430" width="8" height="145" fill="#c8bfb0" rx="1"/>
  <rect x="912" y="430" width="8" height="145" fill="#c8bfb0" rx="1"/>

  <!-- ============================================= -->
  <!-- ENTRANCE — Glass doors with warm light spill -->
  <!-- ============================================= -->

  <!-- Entrance recess -->
  <rect x="620" y="610" width="360" height="90" fill="#1c1917" rx="2"/>

  <!-- Light spill from entrance -->
  <path d="M630,700 L610,750 L990,750 L970,700" fill="#ffeebb" opacity="0.08"/>

  <!-- Glass doors -->
  <rect x="640" y="618" width="60" height="78" fill="#2a2420" rx="2" stroke="#8a7e72" stroke-width="1"/>
  <rect x="710" y="618" width="60" height="78" fill="#2a2420" rx="2" stroke="#8a7e72" stroke-width="1"/>
  <rect x="830" y="618" width="60" height="78" fill="#2a2420" rx="2" stroke="#8a7e72" stroke-width="1"/>
  <rect x="900" y="618" width="60" height="78" fill="#2a2420" rx="2" stroke="#8a7e72" stroke-width="1"/>

  <!-- Warm light inside the doors -->
  <rect x="643" y="621" width="54" height="72" fill="#3a2a18" rx="1" opacity="0.8"/>
  <rect x="713" y="621" width="54" height="72" fill="#3a2a18" rx="1" opacity="0.8"/>
  <rect x="833" y="621" width="54" height="72" fill="#3a2a18" rx="1" opacity="0.8"/>
  <rect x="903" y="621" width="54" height="72" fill="#3a2a18" rx="1" opacity="0.8"/>
  <!-- Warm glow through glass -->
  <rect x="650" y="640" width="40" height="40" fill="#ffd080" opacity="0.08" rx="4"/>
  <rect x="720" y="640" width="40" height="40" fill="#ffd080" opacity="0.1" rx="4"/>
  <rect x="840" y="640" width="40" height="40" fill="#ffd080" opacity="0.08" rx="4"/>
  <rect x="910" y="640" width="40" height="40" fill="#ffd080" opacity="0.1" rx="4"/>

  <!-- Chinese Red Lacquer door detail (centre doors) -->
  <rect x="780" y="618" width="40" height="78" fill="#6b1e1e" rx="2" stroke="#8a7e72" stroke-width="1"/>
  <rect x="783" y="621" width="34" height="72" fill="#8b2e2e" rx="1"/>
  <circle cx="812" cy="660" r="3" fill="#c8a060"/>

  <!-- Display cases / poster boxes -->
  <rect x="555" y="625" width="55" height="65" fill="#1c1917" rx="2" stroke="#5a5045" stroke-width="1"/>
  <rect x="558" y="628" width="49" height="59" fill="#3a2a20" rx="1"/>
  <rect x="990" y="625" width="55" height="65" fill="#1c1917" rx="2" stroke="#5a5045" stroke-width="1"/>
  <rect x="993" y="628" width="49" height="59" fill="#3a2a20" rx="1"/>

  <!-- ============================================= -->
  <!-- SIDEWALK & STREET -->
  <!-- ============================================= -->

  <rect x="0" y="700" width="1600" height="20" fill="url(#sidewalk)"/>
  <rect x="0" y="720" width="1600" height="180" fill="url(#street)"/>

  <!-- Sidewalk edge -->
  <line x1="0" y1="720" x2="1600" y2="720" stroke="#5a5045" stroke-width="1.5"/>

  <!-- Wet street reflections -->
  <rect x="620" y="725" width="360" height="80" fill="#ffeebb" opacity="0.03" rx="4"/>
  <!-- Sign reflection on street -->
  <g opacity="0.06" transform="translate(0,1420) scale(1,-1)">
    <rect x="710" y="130" width="80" height="200" fill="#C22B2B" rx="3"/>
  </g>

  <!-- Street markings -->
  <line x1="0" y1="800" x2="400" y2="800" stroke="#4a4035" stroke-width="2" stroke-dasharray="40,30"/>
  <line x1="500" y1="800" x2="1600" y2="800" stroke="#4a4035" stroke-width="2" stroke-dasharray="40,30"/>

  <!-- ============================================= -->
  <!-- ATMOSPHERIC DETAILS -->
  <!-- ============================================= -->

  <!-- Power lines (subtle, like the original photo) -->
  <line x1="0" y1="280" x2="1600" y2="260" stroke="#2a2420" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="310" x2="1600" y2="295" stroke="#2a2420" stroke-width="1" opacity="0.2"/>

  <!-- Street lamp LEFT -->
  <rect x="390" y="500" width="4" height="200" fill="#3a3530"/>
  <ellipse cx="392" cy="495" rx="12" ry="8" fill="#3a3530"/>
  <ellipse cx="392" cy="494" rx="8" ry="4" fill="#ffeebb" opacity="0.5" filter="url(#softGlow)"/>

  <!-- Street lamp RIGHT -->
  <rect x="1160" y="520" width="4" height="180" fill="#3a3530"/>
  <ellipse cx="1162" cy="515" rx="12" ry="8" fill="#3a3530"/>
  <ellipse cx="1162" cy="514" rx="8" ry="4" fill="#ffeebb" opacity="0.4" filter="url(#softGlow)"/>

  <!-- People silhouettes walking toward theatre -->
  <!-- Couple -->
  <g opacity="0.5">
    <ellipse cx="870" cy="692" rx="8" ry="5" fill="#1c1917"/>
    <rect x="863" y="665" width="14" height="28" fill="#1c1917" rx="5"/>
    <circle cx="870" cy="657" r="7" fill="#1c1917"/>
    <ellipse cx="890" cy="694" rx="7" ry="4" fill="#1c1917"/>
    <rect x="884" y="668" width="12" height="27" fill="#1c1917" rx="4"/>
    <circle cx="890" cy="660" r="6" fill="#1c1917"/>
  </g>

  <!-- Single person approaching -->
  <g opacity="0.35">
    <ellipse cx="680" cy="694" rx="7" ry="4" fill="#1c1917"/>
    <rect x="674" y="668" width="12" height="27" fill="#1c1917" rx="4"/>
    <circle cx="680" cy="660" r="6" fill="#1c1917"/>
  </g>

  <!-- Atmospheric light rays from sign -->
  <g opacity="0.04">
    <polygon points="750,130 650,0 850,0" fill="#C22B2B"/>
    <polygon points="750,130 600,0 900,0" fill="#C22B2B"/>
  </g>

  <!-- Art Deco decorative border at very bottom -->
  <rect x="0" y="890" width="1600" height="10" fill="#1c1917" opacity="0.5"/>
  <g fill="#C22B2B" opacity="0.6">
    <rect x="0" y="893" width="40" height="4" rx="2"/>
    <rect x="50" y="893" width="40" height="4" rx="2"/>
    <rect x="100" y="893" width="40" height="4" rx="2"/>
    <rect x="150" y="893" width="40" height="4" rx="2"/>
    <rect x="200" y="893" width="40" height="4" rx="2"/>
    <rect x="250" y="893" width="40" height="4" rx="2"/>
    <rect x="300" y="893" width="40" height="4" rx="2"/>
    <rect x="350" y="893" width="40" height="4" rx="2"/>
    <rect x="400" y="893" width="40" height="4" rx="2"/>
    <rect x="450" y="893" width="40" height="4" rx="2"/>
    <rect x="500" y="893" width="40" height="4" rx="2"/>
    <rect x="550" y="893" width="40" height="4" rx="2"/>
    <rect x="600" y="893" width="40" height="4" rx="2"/>
    <rect x="650" y="893" width="40" height="4" rx="2"/>
    <rect x="700" y="893" width="40" height="4" rx="2"/>
    <rect x="750" y="893" width="40" height="4" rx="2"/>
    <rect x="800" y="893" width="40" height="4" rx="2"/>
    <rect x="850" y="893" width="40" height="4" rx="2"/>
    <rect x="900" y="893" width="40" height="4" rx="2"/>
    <rect x="950" y="893" width="40" height="4" rx="2"/>
    <rect x="1000" y="893" width="40" height="4" rx="2"/>
    <rect x="1050" y="893" width="40" height="4" rx="2"/>
    <rect x="1100" y="893" width="40" height="4" rx="2"/>
    <rect x="1150" y="893" width="40" height="4" rx="2"/>
    <rect x="1200" y="893" width="40" height="4" rx="2"/>
    <rect x="1250" y="893" width="40" height="4" rx="2"/>
    <rect x="1300" y="893" width="40" height="4" rx="2"/>
    <rect x="1350" y="893" width="40" height="4" rx="2"/>
    <rect x="1400" y="893" width="40" height="4" rx="2"/>
    <rect x="1450" y="893" width="40" height="4" rx="2"/>
    <rect x="1500" y="893" width="40" height="4" rx="2"/>
    <rect x="1550" y="893" width="40" height="4" rx="2"/>
  </g>
</svg>