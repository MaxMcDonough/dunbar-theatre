<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <!-- Dunbar Pass membership card — Art Deco style -->
  <!-- Card body -->
  <rect x="10" y="10" width="380" height="220" rx="12" fill="none" stroke="#C22B2B" stroke-width="2" opacity="0.7"/>
  <rect x="18" y="18" width="364" height="204" rx="8" fill="none" stroke="#C22B2B" stroke-width="0.8" opacity="0.3"/>
  <!-- Art Deco corner ornaments -->
  <g stroke="#C22B2B" stroke-width="1.2" fill="none" opacity="0.5">
    <!-- Top-left -->
    <path d="M30,30 L30,55 M30,30 L55,30 M33,33 L33,50 M33,33 L50,33"/>
    <!-- Top-right -->
    <path d="M370,30 L370,55 M370,30 L345,30 M367,33 L367,50 M367,33 L350,33"/>
    <!-- Bottom-left -->
    <path d="M30,210 L30,185 M30,210 L55,210 M33,207 L33,190 M33,207 L50,207"/>
    <!-- Bottom-right -->
    <path d="M370,210 L370,185 M370,210 L345,210 M367,207 L367,190 M367,207 L350,207"/>
  </g>
  <!-- Stars decoration -->
  <g fill="#C22B2B" opacity="0.25">
    <circle cx="75" cy="45" r="1.5"/>
    <circle cx="95" cy="38" r="1"/>
    <circle cx="305" cy="45" r="1.5"/>
    <circle cx="325" cy="38" r="1"/>
    <circle cx="200" cy="35" r="1.5"/>
  </g>
  <!-- DUNBAR text -->
  <text x="200" y="72" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#C22B2B" opacity="0.8" letter-spacing="8">DUNBAR</text>
  <!-- Decorative line under DUNBAR -->
  <g stroke="#C22B2B" opacity="0.4" fill="none">
    <line x1="110" y1="80" x2="170" y2="80" stroke-width="1"/>
    <path d="M172,80 L180,74 L188,80 L180,86 Z" stroke-width="1"/>
    <line x1="190" y1="80" x2="210" y2="80" stroke-width="1"/>
    <path d="M212,80 L220,74 L228,80 L220,86 Z" stroke-width="1"/>
    <line x1="230" y1="80" x2="290" y2="80" stroke-width="1"/>
  </g>
  <!-- PASS text -->
  <text x="200" y="106" text-anchor="middle" font-family="serif" font-size="20" fill="#C22B2B" opacity="0.6" letter-spacing="14">PASS</text>
  <!-- Film reel mini icon -->
  <g transform="translate(200,145)" stroke="#C22B2B" fill="none" opacity="0.35">
    <circle r="22" stroke-width="1.5"/>
    <circle r="8" stroke-width="1"/>
    <circle r="3" fill="#C22B2B" stroke="none"/>
    <line x1="0" y1="-22" x2="0" y2="-8" stroke-width="0.8"/>
    <line x1="0" y1="8" x2="0" y2="22" stroke-width="0.8"/>
    <line x1="-22" y1="0" x2="-8" y2="0" stroke-width="0.8"/>
    <line x1="8" y1="0" x2="22" y2="0" stroke-width="0.8"/>
    <line x1="-15.5" y1="-15.5" x2="-5.7" y2="-5.7" stroke-width="0.8"/>
    <line x1="5.7" y1="5.7" x2="15.5" y2="15.5" stroke-width="0.8"/>
    <line x1="15.5" y1="-15.5" x2="5.7" y2="-5.7" stroke-width="0.8"/>
    <line x1="-5.7" y1="5.7" x2="-15.5" y2="15.5" stroke-width="0.8"/>
  </g>
  <!-- "A MOVIE A WEEK" text -->
  <text x="200" y="185" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#C22B2B" opacity="0.45" letter-spacing="5">A MOVIE A WEEK</text>
  <!-- Bottom year -->
  <text x="200" y="202" text-anchor="middle" font-family="serif" font-size="11" fill="#C22B2B" opacity="0.3" letter-spacing="3">EST. 1935</text>
  <!-- Subtle magnetic stripe -->
  <rect x="30" y="215" width="340" height="3" rx="1" fill="#C22B2B" opacity="0.1"/>
</svg>